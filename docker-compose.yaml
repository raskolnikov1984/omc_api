services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-10000}:${NGINX_PORT:-10000}"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
    environment:
      - SERVICE_HOST=api
      - SERVICE_PORT=8010
      - NGINX_PORT=10000
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env

  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -X 'GET' 'http://localhost:8010/api/v1/health' -H 'accept: application/json'"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - _data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d ${POSTGRES_DB} -c 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  _data:
  app: